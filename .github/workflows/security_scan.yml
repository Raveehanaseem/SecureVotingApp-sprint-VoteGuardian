name: DevSecOps Security Scan

on:
  push:
    branches: ["**"]  
  pull_request:
    branches: ["**"]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          
      - name: Run Bandit SAST Scan
        run: |
          bandit -r . -v