name: DevSecOps Security Scan

on:
  push:
    branches: [ "main", "phase-3-implementation", "phase-4-testing" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/checkout@v3
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bandit SAST Scan
        run: |
          # Bandit code scan karega aur ghaltiyan dhoonday ga
          bandit -r . -v