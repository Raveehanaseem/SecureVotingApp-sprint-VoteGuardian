name: Security Scan

permissions:
  contents: read
  security-events: write   # Required for CodeQL results

on:
  push:
    branches: [ phase4/Security-testing ]
  pull_request:
    branches: [ phase4/Security-testing ]

jobs:
  # -----------------------------
  # 1️⃣ SAST: CodeQL Analysis
  # -----------------------------
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # -----------------------------
  # 2️⃣ DAST: OWASP ZAP Scan
  # -----------------------------
  dast-scan:
    name: OWASP ZAP DAST Scan (Non-Docker)
    runs-on: ubuntu-latest
    needs: codeql-analysis  # Optional: run after SAST
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies & start Flask
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r online-voting-app/requirements.txt
          nohup flask --app online-voting-app/app run --host=0.0.0.0 --port=5000 &
          sleep 15

      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: 'http://127.0.0.1:5000'
          fail_action: true
