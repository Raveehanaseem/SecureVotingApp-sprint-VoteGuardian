<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vote Cast Successfully | Class Election</title>

  <!--
    FIX [90003] Sub Resource Integrity Attribute Missing:
    Added integrity (SRI hash) and crossorigin="anonymous" to Bootstrap CDN link.
  -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
    crossorigin="anonymous">

  <!--
    FIX [10055] CSP: style-src unsafe-inline:
    Nonce attribute added to <style> tag. Matches the nonce in the CSP header
    set in __init__.py, so 'unsafe-inline' is no longer needed.
  -->
  <style nonce="{{ g.csp_nonce }}">
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      background-color: #008080;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
    }

    .success-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 60px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    /* Gold Checkmark */
    .icon-box {
      font-size: 80px;
      color: #ffcc00;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="container text-center">
    <div class="row justify-content-center">
      <div class="col-md-6 success-card">
        <div class="icon-box">✔</div>
        <h1 class="fw-bold text-white">THANK YOU FOR VOTING</h1>
        <p class="opacity-75 fs-5 mt-3">Your selection has been securely recorded.</p>
        {% if ballot %}
          <p class="mt-3 text-warning">Ballot ID: <strong>{{ ballot.id }}</strong></p>
        {% endif %}
        <a href="/" class="btn btn-light mt-4">Return to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
